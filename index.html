<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Click Counter</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            flex-direction: column;
            background-color: #f0f0f0;
            font-family: Arial, sans-serif;
        }
        #face {
            width: 200px;
            height: 200px;
            background-color: yellow;
            border-radius: 50%;
            position: relative;
            overflow: hidden;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.5);
        }
        .eye {
            width: 25px;
            height: 25px;
            background-color: white;
            border: 2px solid black;
            border-radius: 50%;
            position: absolute;
            top: 30%;
        }
        .eye.left {
            left: 30%;
        }
        .eye.right {
            right: 30%;
        }
        .pupil {
            width: 10px;
            height: 10px;
            background-color: black;
            border-radius: 50%;
            position: absolute;
            top: 25%;
            left: 50%;
            transform: translate(-50%, -50%);
        }
        #counter {
            margin-top: 20px;
            font-size: 24px;
        }
    </style>
</head>
<body>
    <div id="face">
        <div class="eye left">
            <div class="pupil"></div>
        </div>
        <div class="eye right">
            <div class="pupil"></div>
        </div>
    </div>
    <button id="clickButton">Click Me!</button>
    <div id="counter">Click Count: 0</div>
    <script>
        let count = 0;
        const counterDisplay = document.getElementById('counter');
        const clickButton = document.getElementById('clickButton');
        const pupils = document.querySelectorAll('.pupil');

        clickButton.addEventListener('click', () => {
            count++;
            counterDisplay.textContent = `Click Count: ${count}`;
        });

        document.addEventListener('mousemove', (e) => {
            const faceRect = document.getElementById('face').getBoundingClientRect();
            const eyeLeft = document.querySelector('.eye.left');
            const eyeRight = document.querySelector('.eye.right');
            const eyeCenterX = faceRect.left + faceRect.width / 2;
            const eyeCenterY = faceRect.top + faceRect.height / 2;

            const angle = Math.atan2(e.clientY - eyeCenterY, e.clientX - eyeCenterX);
            const distance = Math.min(10, Math.max(-10, (e.clientX - eyeCenterX) / faceRect.width * 100));

            const leftPupil = pupils[0];
            const rightPupil = pupils[1];

            leftPupil.style.transform = `translate(${distance}px, ${distance * -0.5}px)`;
            rightPupil.style.transform = `translate(${distance}px, ${distance * -0.5}px)`;
        });
    </script>
</body>
</html>
